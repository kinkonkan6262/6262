<script>
// ===== Supabase設定（支援記録システムと同じ接続先） =====
const SUPABASE_URL = "https://hhpnhjhfxjjnecfsmzyl.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhocG5oamhmeGpqbmVjZnNtenlsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0ODY5ODUsImV4cCI6MjA5NzA2Mjk4NX0.Xp2NauZpQfJTdv2pfr4ZbzMVKk7H1EwKVHkDNDKw_1k";

const sb = {
  from: (table) => {
    const base = `${SUPABASE_URL}/rest/v1/${table}`;
    const h = {
      "apikey": SUPABASE_KEY,
      "Authorization": `Bearer ${SUPABASE_KEY}`,
      "Content-Type": "application/json",
      "Prefer": "return=representation"
    };
    const buildQ = (url, filters=[]) => ({
      eq: (col,val) => { filters.push(`${col}=eq.${encodeURIComponent(val)}`); return buildQ(url,filters); },
      order: (col,{ascending}={}) => { url += (url.includes("?")?"&":"?") + `order=${col}.${ascending===false?"desc":"asc"}`; return buildQ(url,filters); },
      single: async () => {
        const u = url + (filters.length ? (url.includes("?")?"&":"?") + filters.join("&") : "");
        const r = await fetch(u,{headers:h});
        const d = await r.json();
        return {data: Array.isArray(d)?d[0]||null:d, error: r.ok?null:d};
      },
      then: async (res) => {
        const u = url + (filters.length ? (url.includes("?")?"&":"?") + filters.join("&") : "");
        const r = await fetch(u,{headers:h});
        const d = await r.json();
        res({data: r.ok?d:null, error: r.ok?null:d});
      }
    });
    return {
      select: (cols="*") => buildQ(`${base}?select=${cols}`),
      insert: (rows) => ({
        select: ()=>({
          single: async ()=>{
            const r=await fetch(base,{method:"POST",headers:h,body:JSON.stringify(Array.isArray(rows)?rows[0]:rows)});
            const d=await r.json();
            return {data:Array.isArray(d)?d[0]:d, error:r.ok?null:d};
          }
        }),
        then: async(res)=>{
          const r=await fetch(base,{method:"POST",headers:h,body:JSON.stringify(rows)});
          const d=await r.json();
          res({data:r.ok?d:null,error:r.ok?null:d});
        }
      }),
      update: (body) => {
        let filters=[];
        return {
          eq:(col,val)=>{filters.push(`${col}=eq.${encodeURIComponent(val)}`);return {
            then: async(res)=>{
              const u=base+"?"+ filters.join("&");
              const r=await fetch(u,{method:"PATCH",headers:h,body:JSON.stringify(body)});
              const d=await r.json();
              res({data:r.ok?d:null,error:r.ok?null:d});
            }
          };}
        };
      },
      delete: () => {
        let filters=[];
        return {
          eq:(col,val)=>{filters.push(`${col}=eq.${encodeURIComponent(val)}`);return {
            then: async(res)=>{
              const u=base+"?"+filters.join("&");
              const r=await fetch(u,{method:"DELETE",headers:{...h,"Prefer":""}});
              res({data:null,error:r.ok?null:await r.json()});
            }
          };}
        };
      }
    };
  }
};
</script>
<script type="text/babel">
const {useState, useEffect, useCallback} = React;

// ===== 管理者パスワード（このファイル内で設定） =====
const ADMIN_PASSWORD = "admin2024srms"; // ★ 必ず変更してください

// ===== ライセンスキー生成 =====
function generateLicenseKey() {
  const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
  const seg = () => Array.from({length:4}, ()=>chars[Math.floor(Math.random()*chars.length)]).join("");
  return `SRMS-${seg()}-${seg()}-${seg()}`;
}

// ===== 日付ヘルパー =====
function addYears(date, years) {
  const d = new Date(date);
  d.setFullYear(d.getFullYear() + years);
  return d.toISOString().slice(0,10);
}
function daysLeft(dateStr) {
  if(!dateStr) return null;
  return Math.ceil((new Date(dateStr).getTime() - Date.now()) / (1000*60*60*24));
}
function fmtDate(str) {
  if(!str) return "—";
  return new Date(str).toLocaleDateString("ja-JP",{year:"numeric",month:"short",day:"numeric"});
}

// ===== 管理者ログイン画面 =====
function LoginScreen({onLogin}) {
  const [pw, setPw] = useState("");
  const [err, setErr] = useState("");
  const handle = () => {
    if(pw === ADMIN_PASSWORD) { onLogin(); }
    else { setErr("パスワードが違います"); setPw(""); }
  };
  return (
    <div style={{display:"flex",justifyContent:"center",alignItems:"center",height:"100vh",background:"#1a1a2e"}}>
      <div style={{background:"#16213e",borderRadius:12,padding:"36px 40px",width:360,boxShadow:"0 8px 32px rgba(0,0,0,0.5)"}}>
        <div style={{textAlign:"center",marginBottom:24}}>
          <div style={{fontSize:28,marginBottom:6}}>🔐</div>
          <div style={{color:"#fff",fontSize:18,fontWeight:"bold"}}>管理者ログイン</div>
          <div style={{color:"#888",fontSize:11,marginTop:4}}>支援記録システム｜ライセンス管理ツール</div>
        </div>
        {err && <div style={{background:"#7f1d1d",color:"#fca5a5",borderRadius:6,padding:"8px 12px",fontSize:12,marginBottom:12}}>{err}</div>}
        <input type="password" value={pw} onChange={e=>setPw(e.target.value)}
          onKeyDown={e=>e.key==="Enter"&&handle()}
          placeholder="管理者パスワード"
          style={{width:"100%",padding:"10px 14px",borderRadius:6,border:"1px solid #334155",
            background:"#0f172a",color:"#fff",fontSize:14,outline:"none",marginBottom:12}}/>
        <button onClick={handle}
          style={{width:"100%",padding:"11px 0",background:"#3b82f6",color:"#fff",border:"none",
            borderRadius:6,cursor:"pointer",fontSize:14,fontWeight:"bold"}}>
          ログイン
        </button>
      </div>
    </div>
  );
}

// ===== メイン管理画面 =====
function AdminApp() {
  const [tab, setTab] = useState("customers"); // customers | keys | issue
  const [customers, setCustomers] = useState([]);
  const [keys, setKeys] = useState([]);
  const [loading, setLoading] = useState(true);
  const [msg, setMsg] = useState("");
  const [msgType, setMsgType] = useState("ok");

  // 新規発行フォーム
  const [issueNote, setIssueNote] = useState("");
  const [issueCount, setIssueCount] = useState(1);
  const [issueBusy, setIssueBusy] = useState(false);
  const [newKeys, setNewKeys] = useState([]);

  const notify = (text, type="ok") => { setMsg(text); setMsgType(type); setTimeout(()=>setMsg(""),4000); };

  const load = useCallback(async () => {
    setLoading(true);
    try {
      const {data: facs} = await sb.from("facilities").select("id,email,facility_name,plan,license_expiry,license_key,created_at");
      setCustomers(facs || []);
      const {data: lkeys} = await sb.from("license_keys").select("*");
      setKeys(lkeys || []);
    } catch(e) { notify("読込エラー: "+e.message,"err"); }
    setLoading(false);
  }, []);

  useEffect(()=>{ load(); },[load]);

  // ライセンスキー発行
  const issueKeys = async () => {
    if(issueCount<1||issueCount>50){notify("発行数は1〜50で入力してください","err");return;}
    setIssueBusy(true);
    const generated = [];
    for(let i=0;i<issueCount;i++){
      const key = generateLicenseKey();
      const expiry = addYears(new Date(), 1);
      const row = { license_key:key, months:12, note:issueNote||null, created_at:new Date().toISOString(), expiry_date:expiry };
      const {data,error} = await sb.from("license_keys").insert(row).select().single();
      if(!error && data) generated.push(data);
      else if(error) { notify("発行エラー: "+(error.message||JSON.stringify(error)),"err"); break; }
    }
    setNewKeys(generated);
    if(generated.length>0) notify(`✅ ${generated.length}件のライセンスキーを発行しました`);
    setIssueNote(""); setIssueCount(1);
    await load();
    setIssueBusy(false);
  };

  // ライセンスキー削除
  const deleteKey = async (key) => {
    if(!window.confirm(`「${key}」を削除しますか？\n※お客様が使用中のキーは削除しないでください`)) return;
    await sb.from("license_keys").delete().eq("license_key", key);
    notify("削除しました");
    await load();
  };

  // お客様のプランを手動変更
  const changePlan = async (id, plan, expiry) => {
    await sb.from("facilities").update({plan, license_expiry:expiry}).eq("id", id);
    notify("✅ プランを変更しました");
    await load();
  };

  // クリップボードコピー
  const copy = (text) => {
    navigator.clipboard.writeText(text).then(()=>notify("コピーしました"));
  };

  const copyAll = () => {
    const text = newKeys.map(k=>k.license_key).join("\n");
    navigator.clipboard.writeText(text).then(()=>notify(`${newKeys.length}件のキーをコピーしました`));
  };

  // ステータスバッジ
  const StatusBadge = ({fac}) => {
    const plan = fac.plan||"trial";
    if(plan==="admin") return <span style={badge("#7c3aed","#ede9fe")}>管理者</span>;
    const exp = fac.license_expiry;
    if(!exp) {
      const d = daysLeft(fac.created_at ? new Date(new Date(fac.created_at).getTime()+30*86400000).toISOString().slice(0,10) : null);
      if(d===null) return <span style={badge("#6b7280","#f3f4f6")}>不明</span>;
      return d>0 ? <span style={badge("#2563eb","#dbeafe")}>トライアル残{d}日</span>
                 : <span style={badge("#dc2626","#fee2e2")}>期限切れ</span>;
    }
    const d = daysLeft(exp);
    if(d>30) return <span style={badge("#16a34a","#dcfce7")}>有効 残{d}日</span>;
    if(d>0)  return <span style={badge("#d97706","#fef3c7")}>⚠️ 残{d}日</span>;
    return <span style={badge("#dc2626","#fee2e2")}>期限切れ</span>;
  };
  const badge=(color,bg)=>({background:bg,color,borderRadius:12,padding:"2px 8px",fontSize:10,fontWeight:"bold",whiteSpace:"nowrap"});

  const tabs = [
    {id:"customers",label:"👥 お客様一覧"},
    {id:"keys",label:"🔑 ライセンスキー管理"},
    {id:"issue",label:"✨ キー発行"},
  ];

  const darkCard = {background:"#16213e",borderRadius:8,padding:"16px 18px",marginBottom:12};
  const input = {padding:"7px 10px",borderRadius:5,border:"1px solid #334155",background:"#0f172a",color:"#e2e8f0",fontSize:13,outline:"none"};
  const btn = (bg="#3b82f6",color="#fff")=>({padding:"7px 16px",background:bg,color,border:"none",borderRadius:5,cursor:"pointer",fontSize:12,fontWeight:"bold"});

  return (
    <div style={{minHeight:"100vh",background:"#1a1a2e",color:"#e2e8f0"}}>
      {/* ヘッダー */}
      <div style={{background:"#0f172a",padding:"12px 24px",display:"flex",alignItems:"center",gap:16,borderBottom:"1px solid #1e293b"}}>
        <div>
          <div style={{fontWeight:"bold",fontSize:15,color:"#fff"}}>🛠️ ライセンス管理ツール</div>
          <div style={{fontSize:10,color:"#64748b"}}>支援記録管理システム｜販売者専用</div>
        </div>
        <div style={{marginLeft:"auto",display:"flex",gap:8,alignItems:"center"}}>
          <div style={{fontSize:11,color:"#64748b"}}>
            お客様 {customers.length}件 ／ キー {keys.length}件（未使用 {keys.filter(k=>!k.used_by).length}件）
          </div>
          <button onClick={load} style={{...btn("#1e293b","#94a3b8"),border:"1px solid #334155"}}>🔄 更新</button>
        </div>
      </div>

      {/* 通知 */}
      {msg && <div style={{padding:"10px 24px",background:msgType==="ok"?"#14532d":"#7f1d1d",
        color:msgType==="ok"?"#86efac":"#fca5a5",fontSize:12,fontWeight:"bold"}}>{msg}</div>}

      {/* タブ */}
      <div style={{display:"flex",background:"#0f172a",borderBottom:"1px solid #1e293b",padding:"0 24px"}}>
        {tabs.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)}
            style={{padding:"11px 16px",background:"transparent",border:"none",cursor:"pointer",
              fontSize:13,color:tab===t.id?"#60a5fa":"#64748b",fontWeight:tab===t.id?"bold":"normal",
              borderBottom:tab===t.id?"2px solid #3b82f6":"2px solid transparent"}}>
            {t.label}
          </button>
        ))}
      </div>

      <div style={{padding:"20px 24px",maxWidth:1100}}>
        {loading && <div style={{textAlign:"center",padding:40,color:"#64748b"}}>⏳ 読込中...</div>}

        {/* ===== お客様一覧 ===== */}
        {!loading && tab==="customers" && (
          <div>
            <div style={{fontSize:13,color:"#64748b",marginBottom:12}}>
              登録されているお客様の一覧です。ライセンス状況・期限を確認・変更できます。
            </div>
            {customers.length===0 && <div style={{...darkCard,color:"#64748b",textAlign:"center",padding:32}}>
              まだお客様の登録がありません
            </div>}
            {customers.map(fac=>(
              <CustomerRow key={fac.id} fac={fac} onChange={changePlan} notify={notify} onReload={load} StatusBadge={StatusBadge} badge={badge} btn={btn} input={input} darkCard={darkCard} keys={keys}/>
            ))}
          </div>
        )}

        {/* ===== ライセンスキー管理 ===== */}
        {!loading && tab==="keys" && (
          <div>
            <div style={{display:"flex",gap:12,marginBottom:14,flexWrap:"wrap"}}>
              {[
                {label:"総発行数",val:keys.length,color:"#3b82f6"},
                {label:"未使用",val:keys.filter(k=>!k.used_by).length,color:"#16a34a"},
                {label:"使用済み",val:keys.filter(k=>k.used_by).length,color:"#d97706"},
              ].map(s=>(
                <div key={s.label} style={{background:"#16213e",borderRadius:8,padding:"12px 20px",minWidth:130}}>
                  <div style={{fontSize:11,color:"#64748b",marginBottom:2}}>{s.label}</div>
                  <div style={{fontSize:22,fontWeight:"bold",color:s.color}}>{s.val}</div>
                </div>
              ))}
            </div>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
              <thead>
                <tr style={{borderBottom:"1px solid #1e293b",color:"#64748b"}}>
                  {["ライセンスキー","状態","使用事業所","発行メモ","有効期限(発行基準)","操作"].map(h=>(
                    <th key={h} style={{padding:"8px 10px",textAlign:"left",fontWeight:"normal"}}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {keys.map(k=>{
                  const usedFac = customers.find(c=>c.id===k.used_by);
                  const isUsed = !!k.used_by;
                  return (
                    <tr key={k.license_key} style={{borderBottom:"1px solid #1e293b",
                      background:isUsed?"transparent":"rgba(16,185,129,0.05)"}}>
                      <td style={{padding:"9px 10px"}}>
                        <code style={{color:"#60a5fa",fontSize:12,letterSpacing:"0.05em"}}>{k.license_key}</code>
                        <button onClick={()=>copy(k.license_key)}
                          style={{marginLeft:6,background:"transparent",border:"none",cursor:"pointer",color:"#64748b",fontSize:10}}>📋</button>
                      </td>
                      <td style={{padding:"9px 10px"}}>
                        {isUsed
                          ? <span style={badge("#d97706","#1c1917")}>使用済</span>
                          : <span style={badge("#16a34a","#052e16")}>未使用</span>}
                      </td>
                      <td style={{padding:"9px 10px",color:"#94a3b8",fontSize:11}}>
                        {usedFac ? usedFac.facility_name || usedFac.email : "—"}
                      </td>
                      <td style={{padding:"9px 10px",color:"#94a3b8",fontSize:11}}>{k.note||"—"}</td>
                      <td style={{padding:"9px 10px",color:"#94a3b8",fontSize:11}}>{fmtDate(k.expiry_date)}</td>
                      <td style={{padding:"9px 10px"}}>
                        {!isUsed && (
                          <button onClick={()=>deleteKey(k.license_key)}
                            style={{...btn("#7f1d1d","#fca5a5"),fontSize:11,padding:"4px 10px"}}>削除</button>
                        )}
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        )}

        {/* ===== キー発行 ===== */}
        {!loading && tab==="issue" && (
          <div style={{maxWidth:560}}>
            <div style={darkCard}>
              <div style={{fontWeight:"bold",fontSize:14,color:"#fff",marginBottom:14}}>✨ ライセンスキーを発行する</div>
              <div style={{display:"flex",flexDirection:"column",gap:12}}>
                <div>
                  <div style={{fontSize:11,color:"#94a3b8",marginBottom:4}}>発行数（最大50件）</div>
                  <input type="number" min="1" max="50" value={issueCount}
                    onChange={e=>setIssueCount(Math.max(1,Math.min(50,parseInt(e.target.value)||1)))}
                    style={{...input,width:100}}/>
                </div>
                <div>
                  <div style={{fontSize:11,color:"#94a3b8",marginBottom:4}}>メモ（任意）</div>
                  <input value={issueNote} onChange={e=>setIssueNote(e.target.value)}
                    placeholder="例：○○事業所様 2026年度分"
                    style={{...input,width:"100%"}}/>
                </div>
                <div style={{background:"#0f172a",borderRadius:6,padding:"10px 14px",fontSize:11,color:"#64748b",lineHeight:1.7}}>
                  📋 発行されるキーは <strong style={{color:"#e2e8f0"}}>1年間有効</strong>（SRMS-XXXX-XXXX-XXXX 形式）<br/>
                  お客様がシステム内でキーを入力すると自動で有効化されます。
                </div>
                <button onClick={issueKeys} disabled={issueBusy}
                  style={{...btn(issueBusy?"#334155":"#3b82f6"),padding:"11px 0",fontSize:14,
                    cursor:issueBusy?"not-allowed":"pointer",opacity:issueBusy?0.7:1}}>
                  {issueBusy ? "⏳ 発行中..." : `🔑 ${issueCount}件 発行する`}
                </button>
              </div>
            </div>

            {/* 発行済みキー表示 */}
            {newKeys.length>0 && (
              <div style={{...darkCard,border:"1px solid #1d4ed8"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                  <div style={{fontWeight:"bold",color:"#60a5fa"}}>✅ 発行完了（{newKeys.length}件）</div>
                  <button onClick={copyAll} style={{...btn("#1e3a5f","#93c5fd"),fontSize:11}}>
                    📋 全件コピー
                  </button>
                </div>
                {newKeys.map(k=>(
                  <div key={k.license_key} style={{display:"flex",alignItems:"center",gap:8,
                    padding:"7px 10px",background:"#0f172a",borderRadius:5,marginBottom:6}}>
                    <code style={{flex:1,color:"#60a5fa",fontSize:13,letterSpacing:"0.08em"}}>{k.license_key}</code>
                    <span style={{fontSize:10,color:"#64748b"}}>有効期限: {fmtDate(k.expiry_date)}</span>
                    <button onClick={()=>copy(k.license_key)}
                      style={{...btn("#1e293b","#94a3b8"),fontSize:11,padding:"4px 10px",border:"1px solid #334155"}}>
                      コピー
                    </button>
                  </div>
                ))}
                <div style={{marginTop:8,fontSize:10,color:"#64748b"}}>
                  ↑ このキーをお客様にメール等でお伝えください
                </div>
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

// お客様1行コンポーネント（折りたたみ式）
function CustomerRow({fac, onChange, notify, onReload, StatusBadge, badge, btn, input, darkCard, keys}) {
  const [open, setOpen] = useState(false);
  const [busy, setBusy] = useState(false);
  const usedKey = keys.find(k=>k.used_by===fac.id);

  const extendYear = async () => {
    setBusy(true);
    const base = fac.license_expiry && new Date(fac.license_expiry) > new Date()
      ? fac.license_expiry : new Date().toISOString().slice(0,10);
    const newExp = new Date(base);
    newExp.setFullYear(newExp.getFullYear()+1);
    await onChange(fac.id, "paid", newExp.toISOString().slice(0,10));
    setBusy(false);
  };

  const setTrial = async () => {
    setBusy(true);
    await onChange(fac.id, "trial", null);
    setBusy(false);
  };

  return (
    <div style={{...darkCard,padding:0,overflow:"hidden"}}>
      <div onClick={()=>setOpen(!open)}
        style={{display:"flex",alignItems:"center",gap:12,padding:"12px 16px",cursor:"pointer",
          background:open?"#1e293b":"transparent"}}>
        <div style={{flex:1}}>
          <div style={{fontWeight:"bold",fontSize:13,color:"#fff"}}>
            {fac.facility_name||"（事業所名未設定）"}
          </div>
          <div style={{fontSize:11,color:"#64748b",marginTop:2}}>{fac.email}</div>
        </div>
        <StatusBadge fac={fac}/>
        <div style={{color:"#64748b",fontSize:12}}>{open?"▲":"▼"}</div>
      </div>

      {open && (
        <div style={{padding:"12px 16px",borderTop:"1px solid #1e293b",background:"#0f172a"}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12,fontSize:11}}>
            {[
              ["登録日", new Date(fac.created_at).toLocaleDateString("ja-JP")],
              ["プラン", fac.plan||"trial"],
              ["有効期限", fac.license_expiry ? new Date(fac.license_expiry).toLocaleDateString("ja-JP") : "—"],
              ["使用キー", usedKey ? usedKey.license_key : "—"],
            ].map(([label,val])=>(
              <div key={label}>
                <div style={{color:"#64748b",marginBottom:2}}>{label}</div>
                <div style={{color:"#e2e8f0",fontFamily:label==="使用キー"?"monospace":"inherit",fontSize:label==="使用キー"?11:12}}>{val}</div>
              </div>
            ))}
          </div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            <button onClick={extendYear} disabled={busy}
              style={{...btn("#16a34a"),fontSize:11,padding:"6px 12px"}}>
              📅 1年延長
            </button>
            <button onClick={setTrial} disabled={busy}
              style={{...btn("#1e293b","#94a3b8"),border:"1px solid #334155",fontSize:11,padding:"6px 12px"}}>
              トライアルに戻す
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

// ===== アプリルート =====
function Root() {
  const [authed, setAuthed] = useState(false);
  if(!authed) return <LoginScreen onLogin={()=>setAuthed(true)}/>;
  return <AdminApp/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<Root/>);
</script>
</body>
</html>
